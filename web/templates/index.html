<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kahoot Game ID Getter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 60px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-size: 2rem;
      color: #f5a623;
      letter-spacing: 1px;
    }

    header p {
      margin-top: 8px;
      color: #9ca3af;
      font-size: 0.95rem;
    }

    .card {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 32px 28px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .input-row {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #0f3460;
      background: #0f3460;
      color: #fff;
      font-size: 1.1rem;
      letter-spacing: 2px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #f5a623;
    }

    button {
      padding: 12px 22px;
      border-radius: 8px;
      border: none;
      background: #f5a623;
      color: #1a1a2e;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      white-space: nowrap;
    }

    button:hover:not(:disabled) { background: #e09614; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #status {
      margin-top: 18px;
      font-size: 0.9rem;
      min-height: 20px;
      color: #9ca3af;
      text-align: center;
    }

    /* ── Game ID hero box ── */
    #game-id-box {
      display: none;
      margin-top: 28px;
      background: #0f3460;
      border: 2px solid #f5a623;
      border-radius: 10px;
      padding: 20px 24px;
      text-align: center;
    }

    #game-id-box .uuid-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #9ca3af;
      margin-bottom: 6px;
    }

    #game-id-box .uuid-source {
      font-size: 0.72rem;
      color: #6b7280;
      margin-bottom: 10px;
    }

    #game-id-value {
      font-size: 1.05rem;
      font-weight: 700;
      color: #f5a623;
      letter-spacing: 1.5px;
      word-break: break-all;
    }

    #copy-btn {
      display: inline-block;
      margin-top: 12px;
      padding: 6px 14px;
      font-size: 0.8rem;
      background: #1a1a2e;
      color: #f5a623;
      border: 1px solid #f5a623;
      border-radius: 6px;
    }

    #copy-btn:hover:not(:disabled) { background: #f5a623; color: #1a1a2e; }

    /* ── Info table ── */
    #info-section {
      display: none;
      margin-top: 24px;
    }

    #info-section h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #9ca3af;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    tr:nth-child(even) { background: rgba(15, 52, 96, 0.4); }

    td {
      padding: 8px 10px;
      border-bottom: 1px solid #0f3460;
    }

    td:first-child {
      color: #9ca3af;
      font-weight: 600;
      width: 50%;
    }

    td:last-child {
      color: #e0e0e0;
      word-break: break-all;
    }

    .error-msg {
      margin-top: 18px;
      padding: 14px 16px;
      background: rgba(220, 38, 38, 0.15);
      border: 1px solid #dc2626;
      border-radius: 8px;
      color: #f87171;
      font-size: 0.9rem;
      display: none;
    }
  </style>
</head>
<body>

<header>
  <h1>🎮 Kahoot Game ID Getter</h1>
  <p>Enter a Kahoot PIN to retrieve the internal quiz UUID (Game ID).</p>
</header>

<div class="card">
  <label for="pin-input">Kahoot PIN</label>
  <div class="input-row">
    <input id="pin-input" type="text" placeholder="e.g. 1234567"
           maxlength="10" inputmode="numeric" pattern="\d*" autocomplete="off" />
    <button id="lookup-btn" onclick="lookup()">Look Up</button>
  </div>

  <div id="status"></div>
  <div class="error-msg" id="error-msg"></div>

  <!-- UUID → Game ID hero -->
  <div id="game-id-box">
    <div class="uuid-label">✅ Game ID (converted from UUID)</div>
    <div class="uuid-source" id="uuid-source"></div>
    <div id="game-id-value"></div>
    <button id="copy-btn" onclick="copyId()">Copy</button>
  </div>

  <!-- Full session info -->
  <div id="info-section">
    <h2>Session Details</h2>
    <table id="info-table"></table>
  </div>
</div>

<script>
  const pinInput   = document.getElementById("pin-input");
  const statusEl   = document.getElementById("status");
  const errorEl    = document.getElementById("error-msg");
  const gameIdBox  = document.getElementById("game-id-box");
  const gameIdVal  = document.getElementById("game-id-value");
  const uuidSource = document.getElementById("uuid-source");
  const infoSec    = document.getElementById("info-section");
  const table      = document.getElementById("info-table");
  const lookupBtn  = document.getElementById("lookup-btn");

  pinInput.addEventListener("keydown", e => { if (e.key === "Enter") lookup(); });

  function reset() {
    statusEl.textContent   = "";
    errorEl.style.display  = "none";
    errorEl.textContent    = "";
    gameIdBox.style.display = "none";
    infoSec.style.display  = "none";
    table.innerHTML        = "";
  }

  async function lookup() {
    const pin = pinInput.value.trim();
    if (!/^\d{4,10}$/.test(pin)) {
      showError("PIN must be 4–10 digits.");
      return;
    }

    reset();
    lookupBtn.disabled = true;
    statusEl.textContent = "⏳ Looking up PIN " + pin + " …";

    try {
      const res  = await fetch("/api/lookup", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ pin }),
      });
      const data = await res.json();

      if (!res.ok) {
        showError(data.error || "Unexpected error from server.");
        return;
      }

      statusEl.textContent = "";

      // ── UUID → Game ID conversion hero ──────────────────────────────────
      // The raw API returns the quiz identifier as a UUID string.
      // We display it here as the canonical "Game ID" used by Kahoot internally.
      const raw  = data.game_id;                        // e.g. "a1b2c3d4-e5f6-..."
      const gameId = uuidToGameId(raw);                 // formatted game ID

      uuidSource.textContent = "Source UUID: " + raw;
      gameIdVal.textContent  = gameId;
      gameIdBox.style.display = "block";

      // ── Session details table ────────────────────────────────────────────
      if (data.rows && data.rows.length) {
        table.innerHTML = data.rows.map(r =>
          `<tr><td>${escHtml(r.label)}</td><td>${escHtml(r.value)}</td></tr>`
        ).join("");
        infoSec.style.display = "block";
      }

    } catch (err) {
      showError("Network error: " + err.message);
    } finally {
      lookupBtn.disabled = false;
    }
  }

  /**
   * Convert a UUID string to the Kahoot Game ID format.
   *
   * Kahoot uses standard RFC 4122 UUIDs as quiz identifiers
   * (8-4-4-4-12 hex groups). This function normalises the raw
   * value from the API to that canonical lowercase hyphenated form,
   * making it copy-paste-ready for Kahoot URLs and API calls.
   *
   * If the value is already a well-formed UUID it is returned as-is
   * (lowercase). Any other format is returned unchanged.
   */
  function uuidToGameId(raw) {
    if (!raw) return raw;
    const clean = raw.toLowerCase().replace(/[^0-9a-f]/g, "");
    if (clean.length === 32) {
      // Re-insert hyphens in 8-4-4-4-12 pattern
      return [
        clean.slice(0, 8),
        clean.slice(8, 12),
        clean.slice(12, 16),
        clean.slice(16, 20),
        clean.slice(20)
      ].join("-");
    }
    return raw;
  }

  function copyId() {
    const text = gameIdVal.textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById("copy-btn");
      btn.textContent = "Copied!";
      setTimeout(() => { btn.textContent = "Copy"; }, 1500);
    });
  }

  function showError(msg) {
    statusEl.textContent   = "";
    errorEl.textContent    = msg;
    errorEl.style.display  = "block";
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
</script>

</body>
</html>
